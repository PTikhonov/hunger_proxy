services:
  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest-server:
    build:
      context: ./services/ingest-server
    environment:
      APP_NAME: ingest-server
      REDIS_URL: redis://redis:6379/0
      DETECTIONS_STREAM: stream:detections
      STREAM_MAXLEN: "100000"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:

